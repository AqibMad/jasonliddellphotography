services:
  store_access_control.access:
    class: Drupal\store_access_control\Service\StoreAccess
    arguments: ['@current_user']

  store_access_control.route_subscriber:
    class: Drupal\store_access_control\EventSubscriber\StoreRouteSubscriber
    arguments: ['@store_access_control.access']
    tags:
      - { name: event_subscriber }