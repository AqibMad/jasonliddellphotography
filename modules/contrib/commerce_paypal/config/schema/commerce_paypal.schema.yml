  mapping:
    partner:
      type: string
      label: 'Partner'
    vendor:
      type: string
      label: 'Vendor'
    user:
      type: string
      label: 'User'
    password:
      type: string
      label: 'Password'
commerce_payment.commerce_payment_gateway.plugin.paypal_payflow_link:
  type: commerce_payment_gateway_configuration
  mapping:
    partner:
      type: string
      label: 'Partner'
    vendor:
      type: string
      label: 'Vendor'
    user:
      type: string
      label: 'User'
    password:
      type: string
      label: 'Password'
    trxtype:
      type: string
      label: 'Default transaction type'
    redirect_mode:
      type: string
      label: 'Checkout redirect mode'
